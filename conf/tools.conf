# Tools Configuration
#
# Format: name ::: check_command ::: description [::: optional]
#
# check_command is evaluated as a shell expression (exit 0 = installed).
# Use "command -v <cmd>" for tools available in PATH.
# Use "test -e <path>" for apps installed to a fixed location.
# Combine with "||" to support multiple install locations.
# Add ::: optional as a 4th field to mark a tool as optional.
#
# Lines starting with # are comments. Empty lines are ignored.
# Group with comment headers (# --- Group Name ---) for readability.

# --- Core ---
make              ::: command -v make                                                                              ::: Build tool

# --- Terminal ---
ghostty           ::: command -v ghostty                                                                          ::: GPU-accelerated terminal emulator

# --- Shells ---
bash               ::: command -v bash                                                                              ::: Bash
zsh               ::: command -v zsh                                                                              ::: Z shell                            ::: optional

# --- Containers ---
docker            ::: command -v docker                                                                           ::: Docker CLI
docker-desktop    ::: command -v docker-desktop || test -d /opt/docker-desktop                                   ::: Docker Desktop GUI

# --- Git ---
git               ::: command -v git                                                                               ::: Version control
gh                ::: command -v gh                                                                                ::: GitHub CLI
smartgit          ::: command -v smartgit || test -e /usr/share/smartgit/bin/smartgit.sh                         ::: SmartGit GUI client

# --- Editors ---
nano			  ::: command -v nano																			 ::: nano terminal editor
jetbrains-toolbox ::: command -v jetbrains-toolbox || test -e "$HOME/.local/share/JetBrains/Toolbox/bin/jetbrains-toolbox" || grep -rq "jetbrains-toolbox" "$HOME/.local/share/applications/jetbrains-toolbox.desktop" 2>/dev/null ::: JetBrains Toolbox (IDE manager) ::: optional
phpstorm          ::: command -v phpstorm || test -d "$HOME/.local/share/JetBrains/Toolbox/apps/PhpStorm"        ::: PhpStorm IDE                       ::: optional
vscode            ::: command -v code || test -d /usr/share/code || test -e /snap/bin/code                       ::: Visual Studio Code                 ::: optional
