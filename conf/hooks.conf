# Post-Install Hooks Configuration
#
# Commands run once after install, triggered when a matching file was synced.
# If multiple synced files match the same hook, the command runs only once.
#
# Pattern is a path prefix relative to the repo root (user_home/... or root/...).
# Prefix matching: "root/usr/share/fonts/" matches all files under that path.
#
# Note: hooks run inside the install.sh process (a subshell of your terminal).
#   System commands like fc-cache work fine here.
#   Shell reloads (source ~/.bashrc) apply to that subshell only — the echo
#   message below is a reminder that the change won't be visible until you open
#   a new terminal or source manually.
#
# Format: path_prefix ::: command

# --- Shell configs ---
user_home/.bashrc    ::: source "$HOME/.bashrc"  && echo "  → ~/.bashrc reloaded (open a new terminal to see changes)"
user_home/.zshrc     ::: source "$HOME/.zshrc"   && echo "  → ~/.zshrc reloaded (open a new terminal to see changes)"

# --- Fonts ---
root/usr/share/fonts ::: fc-cache -f
